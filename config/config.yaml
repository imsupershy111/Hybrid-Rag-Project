# Ollama Configuration (Dùng cho Embedding)
ollama:
  base_url: "http://localhost:11434"
  embedding_model: "nomic-embed-text"

# OpenRouter Configuration (để gọi Cloud LLM)
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  model: "nvidia/nemotron-3-super-120b-a12b:free" # Hoặc model bạn thích

data:
  directory: "./data"
  supported_formats: ["txt", "pdf", "md", "docx", "csv"]

retrieval:
  vector_search_k: 5
  keyword_search_k: 5

document_processing:
  text_chunk_size: 1000
  text_chunk_overlap: 200
  csv_chunk_size: 10
  use_separate_retrievers: true
  csv_retriever_weight: 0.4
  text_retriever_weight: 0.6

mcp_server:
  host: "0.0.0.0"
  port: 8000

vector_store:
  persist_directory: "./chroma_db"